name: RSS Alert

permissions:
  contents: write  # push 権限を追加
  
on:
  schedule:
    - cron: "*/30 * * * *"  # 30分ごとに実行
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 8  # 8 分でタイムアウト [web:425][web:427]
    
    steps:
      - uses: actions/checkout@v4

      - name: 既存の state ファイルを取得
        run: |
          if git show HEAD:last_checked.json > last_checked.json 2>/dev/null; then
            echo "state file exists"
          else
            echo '{"last_links": []}' > last_checked.json
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install feedparser requests

      - run: python check_rss.py
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: state ファイルをコミット
        if: success()
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add last_checked.json
          git diff --staged --quiet || git commit -m "Update last_checked.json"
          git push
